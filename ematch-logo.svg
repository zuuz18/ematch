<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00e676" flood-opacity="0.4"/>
    </filter>
    <filter id="innerglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="200" height="200" rx="40" fill="none"
    stroke="url(#bolt)" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Glow circle behind bolt -->
  <ellipse cx="100" cy="105" rx="55" ry="60" fill="url(#glow)"/>

  <!-- Lightning bolt shape -->
  <path d="M115 28 L68 108 L95 108 L82 172 L142 84 L112 84 Z"
    fill="url(#bolt)" filter="url(#shadow)"/>

  <!-- Inner highlight on bolt -->
  <path d="M115 28 L68 108 L87 108 L95 108 L82 145 L125 84 L112 84 Z"
    fill="white" fill-opacity="0.08"/>
</svg>
