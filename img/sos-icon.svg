<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#ffcc60"/>
      <stop offset="40%" stop-color="#e07818"/>
      <stop offset="100%" stop-color="#8b3c00"/>
    </radialGradient>
    <radialGradient id="inn" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#a040aa"/>
      <stop offset="100%" stop-color="#4a0a60"/>
    </radialGradient>
    <radialGradient id="sh" cx="32%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" filter="drop-shadow(0 2px 3px rgba(0,0,0,0.5))"/>
  <!-- Inner purple circle -->
  <circle cx="50" cy="50" r="36" fill="url(#inn)"/>
  <circle cx="50" cy="50" r="36" fill="none" stroke="#cc88dd" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Star of Somalia -->
  <polygon points="50,21 57,37 74,37 61,47 66,63 50,53 34,63 39,47 26,37 43,37"
    fill="#fff" fill-opacity="0.93" stroke="#ddb0ea" stroke-width="0.4"/>
  <!-- SH text -->
  <text x="50" y="79"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-weight="900"
    font-size="11"
    fill="#ffe0a0"
    letter-spacing="2">SOS</text>
  <!-- Shine -->
  <circle cx="50" cy="50" r="48" fill="url(#sh)"/>
</svg>
