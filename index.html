<!DOCTYPE html>
<html lang="so" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050810">
  <title>eMatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g:   #00ff88;
      --b:   #0af;
      --p:   #a855f7;
      --red: #ff3d5a;
      --bg:  #050810;
      --border: rgba(255,255,255,.08);
      --text: #f0f4ff;
      --muted: rgba(240,244,255,.4);
      --font-display: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* ══ LOADING ══════════════════════════════════════ */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity .5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }

    .ld-logo { position: relative; width: 80px; height: 80px; margin-bottom: 22px; }
    .ld-logo-inner {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, #001a0d, #001220);
      border: 1px solid rgba(0,255,136,.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; position: relative; z-index: 1;
      animation: ldFloat 2.4s ease-in-out infinite;
    }
    @keyframes ldFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .ld-ring {
      position: absolute; inset: -10px; border-radius: 30px;
      border: 2px solid transparent;
      background: linear-gradient(var(--bg),var(--bg)) padding-box,
                  conic-gradient(var(--g),var(--b),var(--p),var(--g)) border-box;
      animation: ldSpin 2s linear infinite;
    }
    @keyframes ldSpin { to{transform:rotate(360deg)} }
    .ld-title {
      font-family: var(--font-display); font-size: 30px; font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--g), var(--b));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .ld-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .ld-bar { width: 100px; height: 2px; background: var(--border); border-radius: 99px; margin-top: 18px; overflow: hidden; }
    .ld-bar-fill {
      height: 100%; background: linear-gradient(90deg,var(--g),var(--b)); border-radius: 99px;
      animation: ldBar 1.8s ease-in-out infinite;
    }
    @keyframes ldBar {
      0%{width:0%;margin-left:0%} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%}
    }

    /* ══ AUTH PAGE — scrollable, centers on tall screens ══ */
    #auth-page {
      min-height: 100dvh;
      position: relative;
      opacity: 0;
      transition: opacity .5s ease;
      overflow-x: hidden;
      overflow-y: auto;
    }
    #auth-page.visible { opacity: 1; }

    /* ── Background ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,136,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .bg-orb-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle,rgba(0,255,136,.12),transparent 70%);
      top: -80px; left: -80px;
      animation: orb1 8s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 240px; height: 240px;
      background: radial-gradient(circle,rgba(0,170,255,.10),transparent 70%);
      bottom: 10%; right: -60px;
      animation: orb2 10s ease-in-out infinite;
    }
    .bg-orb-3 {
      width: 180px; height: 180px;
      background: radial-gradient(circle,rgba(168,85,247,.08),transparent 70%);
      top: 50%; left: 30%;
      animation: orb3 12s ease-in-out infinite;
    }
    @keyframes orb1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
    @keyframes orb2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
    @keyframes orb3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

    .particle {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      animation: pFly linear infinite;
    }
    @keyframes pFly {
      0%{transform:translateY(100vh) rotate(0deg);opacity:0}
      10%{opacity:1} 90%{opacity:1}
      100%{transform:translateY(-20vh) rotate(720deg);opacity:0}
    }

    /* ── Scroll wrapper — centers vertically, scrolls when short ── */
    .auth-scroll {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      justify-content: center;
      padding: clamp(16px,4vh,36px) 16px clamp(16px,3vh,28px);
    }

    /* ── Hero ── */
    .auth-hero { text-align: center; padding-bottom: clamp(10px,2vh,20px); }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,255,136,.08); border: 1px solid rgba(0,255,136,.2);
      border-radius: 99px; padding: 4px 12px;
      font-size: 10px; font-weight: 600; color: var(--g);
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: clamp(8px,1.5vh,14px);
      animation: slideDown .6s ease both;
    }
    .hero-badge::before {
      content:''; width:6px; height:6px; border-radius:50%; background:var(--g);
      animation: bPulse 1.5s ease-in-out infinite;
    }
    @keyframes bPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    .hero-logo-wrap {
      position: relative;
      width: clamp(52px,10vh,68px); height: clamp(52px,10vh,68px);
      margin: 0 auto clamp(8px,1.5vh,14px);
      animation: slideDown .6s .1s ease both;
    }
    .hero-logo {
      width: 100%; height: 100%;
      border-radius: clamp(13px,3vh,17px);
      background: linear-gradient(135deg,#001a0d,#001628);
      border: 1px solid rgba(0,255,136,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(26px,5vh,34px);
      position: relative; z-index: 1;
      box-shadow: 0 0 0 1px rgba(0,255,136,.1), 0 0 24px rgba(0,255,136,.15);
    }
    .hero-logo-glow {
      position: absolute; inset: -8px; border-radius: 25px;
      background: radial-gradient(circle,rgba(0,255,136,.2),transparent 70%);
      animation: gPulse 2.5s ease-in-out infinite;
    }
    @keyframes gPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(26px,5vh,36px); font-weight: 700;
      letter-spacing: 5px; line-height: 1;
      background: linear-gradient(135deg,#fff 30%,var(--g) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      animation: slideDown .6s .2s ease both;
    }
    .hero-tagline {
      font-size: clamp(9px,1.8vh,11px); color: var(--muted);
      letter-spacing: 2.5px; text-transform: uppercase;
      animation: slideDown .6s .3s ease both;
    }
    .hero-tagline span { color: var(--g); }

    /* ── Card ── */
    .auth-card {
      width: 100%; max-width: 440px; margin: 0 auto;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 22px; overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03), 0 20px 50px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
      animation: slideUp .6s .35s ease both;
    }

    /* ── Tabs ── */
    .auth-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,.3);
      border-bottom: 1px solid var(--border);
      padding: 5px; gap: 4px;
    }
    .tab-btn {
      padding: clamp(9px,1.5vh,12px);
      font-size: 13px; font-weight: 700;
      color: var(--muted); text-align: center; cursor: pointer;
      border: none; background: none; font-family: var(--font-body);
      border-radius: 12px; transition: all .2s ease; letter-spacing: .3px;
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
    }
    .tab-btn.active {
      background: rgba(0,255,136,.08); color: var(--g);
      border: 1px solid rgba(0,255,136,.15);
    }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 24px; height: 2px; background: var(--g); border-radius: 99px;
    }

    /* ── Form area ── */
    .tab-content { padding: clamp(12px,2.2vh,20px) 16px clamp(14px,2.2vh,22px); }
    .tab-content.hidden { display: none; }

    .tab-content.tab-enter .form-group { animation: fgIn .4s ease both; }
    .tab-content.tab-enter .form-group:nth-child(1){animation-delay:.05s}
    .tab-content.tab-enter .form-group:nth-child(2){animation-delay:.10s}
    .tab-content.tab-enter .form-group:nth-child(3){animation-delay:.15s}
    .tab-content.tab-enter .form-group:nth-child(4){animation-delay:.20s}
    .tab-content.tab-enter .btn-auth    {animation:fgIn .4s .25s ease both}
    .tab-content.tab-enter .auth-divider{animation:fgIn .4s .28s ease both}
    .tab-content.tab-enter .btn-google  {animation:fgIn .4s .32s ease both}
    @keyframes fgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .form-group { margin-bottom: clamp(8px,1.4vh,13px); }
    .form-group label {
      display: block; font-size: 10px; font-weight: 600;
      color: var(--muted); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: .8px;
    }

    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: clamp(10px,1.6vh,13px) 16px;
      font-size: 15px; color: var(--text); font-family: var(--font-body);
      transition: all .2s ease; outline: none;
    }
    .input-wrap input::placeholder { color: rgba(240,244,255,.2); }
    .input-wrap input:focus {
      border-color: rgba(0,255,136,.4); background: rgba(0,255,136,.04);
      box-shadow: 0 0 0 3px rgba(0,255,136,.08);
    }
    .input-wrap input.input-error { border-color: rgba(255,61,90,.5); background: rgba(255,61,90,.04); }
    .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
    }
    .input-wrap.has-icon input { padding-left: 38px; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 4px; display: flex; align-items: center; transition: color .2s;
    }
    .pw-toggle:hover { color: var(--text); }
    .error-msg {
      font-size: 10px; color: var(--red);
      margin-top: 3px; min-height: 13px; display: block; padding-left: 3px;
    }

    .forgot-link {
      background: none; border: none; color: var(--g);
      font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: var(--font-body); padding: 0; margin-top: 5px;
      display: block; text-align: right; opacity: .8;
    }

    .btn-auth {
      width: 100%; margin-top: clamp(10px,1.6vh,14px);
      padding: clamp(11px,1.6vh,14px);
      background: linear-gradient(135deg,#00cc6a,#00aadd);
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700; color: #000;
      font-family: var(--font-body); cursor: pointer; letter-spacing: .3px;
      position: relative; overflow: hidden; transition: all .2s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 18px rgba(0,255,136,.25);
    }
    .btn-auth::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
      opacity:0; transition:opacity .2s;
    }
    .btn-auth:hover::before{opacity:1}
    .btn-auth:active{transform:scale(.97)}
    .btn-auth .btn-spinner {
      display:none; width:17px; height:17px;
      border:2px solid rgba(0,0,0,.2); border-top-color:#000;
      border-radius:50%; animation:spin .6s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-auth.loading .btn-text{display:none}
    .btn-auth.loading .btn-spinner{display:block}

    .auth-divider {
      display: flex; align-items: center; gap: 10px;
      margin: clamp(8px,1.4vh,12px) 0;
      color: var(--muted); font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .auth-divider::before,.auth-divider::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(90deg,transparent,var(--border),transparent);
    }

    .btn-google {
      width: 100%;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 12px; padding: clamp(10px,1.6vh,13px);
      font-size: 13px; font-weight: 600; color: var(--text);
      font-family: var(--font-body); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all .2s ease; -webkit-tap-highlight-color: transparent;
    }
    .btn-google:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.15); }
    .btn-google:active{transform:scale(.97)}

    .auth-terms {
      font-size: 10px; color: var(--muted);
      text-align: center; margin-top: 10px; line-height: 1.6;
    }

    /* ── Stats row ── */
    .auth-stats {
      display: flex; justify-content: center; gap: 28px;
      padding: clamp(10px,1.8vh,18px) 0 0;
      max-width: 440px; margin: 0 auto;
      animation: slideUp .6s .5s ease both;
    }
    .auth-stat { text-align: center; }
    .auth-stat-val {
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      color: var(--g); letter-spacing: 1px; line-height: 1;
    }
    .auth-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .auth-stat-sep { width: 1px; background: var(--border); align-self: stretch; margin: 3px 0; }

    @keyframes slideDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }

    .offline-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,61,90,.9); color: #fff;
      text-align: center; padding: 10px; font-size: 13px; font-weight: 600;
    }
    .offline-banner.hidden { display: none; }

  </style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="loading-screen">
    <div class="ld-logo">
      <div class="ld-ring"></div>
      <div class="ld-logo-inner">🎮</div>
    </div>
    <div class="ld-title">eMATCH</div>
    <div class="ld-sub">Gaming Platform</div>
    <div class="ld-bar"><div class="ld-bar-fill"></div></div>
  </div>

  <!-- AUTH PAGE -->
  <div id="auth-page">

    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div id="particles"></div>

    <div id="offline-banner" class="offline-banner hidden" role="alert">
      📵 Internetka kuma xidna
    </div>

    <div class="auth-scroll">

      <!-- Hero -->
      <div class="auth-hero">
        <div class="hero-badge">🟢 Live Now</div>
        <div class="hero-logo-wrap">
          <div class="hero-logo-glow"></div>
          <div class="hero-logo">🎮</div>
        </div>
        <div class="hero-title">eMATCH</div>
        <div class="hero-tagline">Ciyaar · <span>Tartam</span> · Guuleeso</div>
      </div>

      <!-- Card -->
      <div class="auth-card">

        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login"    aria-selected="true">🔑 Gal</button>
          <button class="tab-btn"        data-tab="register" aria-selected="false">⚡ Diiwaan Geli</button>
        </div>

        <!-- LOGIN -->
        <div class="tab-content tab-enter" data-tab="login">
          <form id="login-form" novalidate>

            <div class="form-group">
              <label for="login_email">Email</label>
              <div class="input-wrap has-icon">
                <span class="input-icon">✉️</span>
                <input type="email" id="login_email" placeholder="email@example.com" autocomplete="email" inputmode="email">
              </div>
              <span class="error-msg" id="login_email_err"></span>
            </div>

            <div class="form-group">
              <label for="login_password">Password</label>
              <div class="input-wrap has-icon">
                <span class="input-icon">🔒</span>
                <input type="password" id="login_password" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="pw-toggle" aria-label="Password muuji/qari">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <span class="error-msg" id="login_password_err"></span>
              <button type="button" class="forgot-link" id="btn_forgot_pw">Password-ka ilowday?</button>
            </div>

            <button type="submit" class="btn-auth" id="btn_login">
              <span class="btn-text">🔑 Gal</span>
              <div class="btn-spinner"></div>
            </button>

            <div class="auth-divider">ama</div>

            <button type="button" class="btn-google" id="btn_google">
              <svg width="17" height="17" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Gmail ku gal
            </button>

          </form>
        </div>

        <!-- REGISTER -->
        <div class="tab-content hidden" data-tab="register">
          <form id="register-form" novalidate>

            <div class="form-group">
              <label for="reg_fullName">Magaca Buuxa</label>
              <div class="input-wrap has-icon">
                <span class="input-icon">👤</span>
                <input type="text" id="reg_fullName" placeholder="Magacaaga oo buuxa" autocomplete="name">
              </div>
              <span class="error-msg" id="reg_fullName_err"></span>
            </div>

            <div class="form-group">
              <label for="reg_email">Email</label>
              <div class="input-wrap has-icon">
                <span class="input-icon">✉️</span>
                <input type="email" id="reg_email" placeholder="email@example.com" autocomplete="email" inputmode="email">
              </div>
              <span class="error-msg" id="reg_email_err"></span>
            </div>

            <div class="form-group">
              <label for="reg_phone">Telefoon</label>
              <div class="input-wrap has-icon">
                <span class="input-icon">📱</span>
                <input type="tel" id="reg_phone" placeholder="+252xxxxxxxxx" autocomplete="tel" inputmode="tel">
              </div>
              <span class="error-msg" id="reg_phone_err"></span>
            </div>

            <div class="form-group">
              <label for="reg_password">Password</label>
              <div class="input-wrap has-icon">
                <span class="input-icon">🔒</span>
                <input type="password" id="reg_password" placeholder="Ugu yaraan 8 xaraf" autocomplete="new-password">
                <button type="button" class="pw-toggle" aria-label="Password muuji/qari">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <span class="error-msg" id="reg_password_err"></span>
            </div>

            <button type="submit" class="btn-auth" id="btn_register">
              <span class="btn-text">⚡ Xisaab Fur</span>
              <div class="btn-spinner"></div>
            </button>

<script type="module">
  // Minimal init — app.js handles all auth logic including Google redirect
  // This script only manages loading screen visibility
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAW921oL1KTEk5n75xWvfGWM4Ab1SKnpbg",
    authDomain:        "ematch8.netlify.app",
    projectId:         "ematch-bb818",
    storageBucket:     "ematch-bb818.firebasestorage.app",
    messagingSenderId: "955647946180",
    appId:             "1:955647946180:web:c66947044f0dd6f633c891"
  };

  const fireApp  = getApps().find(a => a.name === '[DEFAULT]') || initializeApp(firebaseConfig);
  const fireAuth = getAuth(fireApp);
  const loadingEl = document.getElementById('loading-screen');
  const authEl    = document.getElementById('auth-page');

  function hideLoading() {
    if (loadingEl) { loadingEl.classList.add('fade-out'); setTimeout(() => loadingEl.style.display = 'none', 500); }
  }

  // If user already logged in → dashboard, else show login page
  // Check if we just logged out — don't redirect back to dashboard
  const justLoggedOut = sessionStorage.getItem('ematch_logged_out');
  if (justLoggedOut) sessionStorage.removeItem('ematch_logged_out');

  const unsub = onAuthStateChanged(fireAuth, user => {
    unsub();
    if (user && !justLoggedOut) {
      window.location.replace('dashboard.html');
    } else {
      hideLoading();
      setTimeout(() => authEl?.classList.add('visible'), 50);
      initParticles();
      initTabs();
    }
  });

  function initParticles() {
    const c = document.getElementById('particles');
    const colors = ['rgba(0,255,136,.5)','rgba(0,170,255,.5)','rgba(168,85,247,.5)'];
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = 2 + Math.random() * 3;
      p.style.cssText = `width:${s}px;height:${s}px;background:${colors[i%3]};left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*8}s;`;
      c.appendChild(p);
    }
  }

  function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
        btn.classList.add('active'); btn.setAttribute('aria-selected','true');
        document.querySelectorAll('.tab-content').forEach(c => {
          if (c.dataset.tab === tab) {
            c.classList.remove('hidden');
            c.classList.remove('tab-enter');
            void c.offsetWidth;
            c.classList.add('tab-enter');
          } else {
            c.classList.add('hidden');
          }
        });
      });
    });
  }
</script>
