<!DOCTYPE html>
<html lang="so" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>eMatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <style>

    /* ── Loading Screen ───────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--bg-base);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity .3s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(0,230,118,.3);
      animation: logoPulse 1.8s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 24px rgba(0,230,118,.25); transform: scale(1); }
      50%       { box-shadow: 0 0 48px rgba(0,230,118,.45); transform: scale(1.04); }
    }
    .loading-title {
      font-size: 26px; font-weight: 900;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .loading-dots {
      display: flex; gap: 6px; margin-top: 12px;
    }
    .loading-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent-green); opacity: .3;
      animation: dotBlink 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .2s; }
    .loading-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dotBlink {
      0%, 100% { opacity: .3; transform: scale(1); }
      50%       { opacity: 1;  transform: scale(1.3); }
    }

    /* ── Auth Page Layout ─────────────────────────────── */
    #auth-page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      background: var(--bg-base);
      opacity: 0;
      transition: opacity .3s ease;
    }
    #auth-page.visible { opacity: 1; }

    /* ── Hero / Branding ──────────────────────────────── */
    .auth-hero {
      padding: 48px var(--sp-md) var(--sp-xl);
      text-align: center;
      background: linear-gradient(180deg, rgba(0,230,118,.06) 0%, transparent 100%);
      border-bottom: 1px solid var(--glass-border);
    }
    .auth-logo {
      width: 72px; height: 72px;
      border-radius: var(--r-lg);
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto var(--sp-md);
      box-shadow: 0 0 32px rgba(0,230,118,.25);
    }
    .auth-hero h1 {
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .auth-hero p { font-size: 13px; color: var(--text-muted); margin: 0; }

    /* ── Tab Switcher ─────────────────────────────────── */
    .auth-tabs {
      display: flex;
      background: var(--bg-card);
      border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 10;
    }
    .tab-btn {
      flex: 1; padding: 14px;
      font-size: 14px; font-weight: 700;
      color: var(--text-muted); text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      border-top: none; border-left: none; border-right: none;
      background: none; font-family: inherit;
      transition: all var(--dur-fast) var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      color: var(--accent-green);
      border-bottom-color: var(--accent-green);
    }

    /* ── Tab Content ──────────────────────────────────── */
    .tab-content { padding: var(--sp-lg) var(--sp-md); flex: 1; }
    .tab-content.hidden { display: none; }

    /* ── Form Styles ──────────────────────────────────── */
    .auth-form { max-width: 420px; margin: 0 auto; }

    .form-group { margin-bottom: var(--sp-md); }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 13px 16px;
      font-size: 15px; color: var(--text-primary);
      font-family: inherit;
      transition: border-color var(--dur-fast);
      box-sizing: border-box;
    }
    .input-wrap input:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(0,230,118,.12);
    }
    .input-wrap input.input-error { border-color: var(--accent-red); }
    .input-wrap input::placeholder { color: var(--text-muted); opacity: .6; }

    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-muted); cursor: pointer; padding: 4px;
      display: flex; align-items: center;
    }
    .error-msg {
      font-size: 11px; color: var(--accent-red);
      margin-top: 4px; min-height: 16px; display: block;
    }

    /* ── Divider ──────────────────────────────────────── */
    .auth-divider {
      display: flex; align-items: center;
      gap: var(--sp-sm); margin: var(--sp-md) 0;
      color: var(--text-muted); font-size: 12px; font-weight: 600;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--glass-border);
    }

    /* ── Google Button ────────────────────────────────── */
    .btn-google {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 13px 16px;
      font-size: 14px; font-weight: 700;
      color: var(--text-primary); font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: all var(--dur-fast) var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-google:active { opacity: .8; transform: scale(.98); }

    /* ── Forgot Password ──────────────────────────────── */
    .forgot-link {
      background: none; border: none;
      color: var(--accent-green);
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      padding: 0; margin-top: var(--sp-sm);
      display: block; text-align: right;
    }

    .btn-auth { width: 100%; margin-top: var(--sp-md); }

    .auth-terms {
      font-size: 11px; color: var(--text-muted);
      text-align: center; margin-top: var(--sp-md); line-height: 1.5;
    }

  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════════════════ -->
  <!-- LOADING SCREEN                                     -->
  <!-- ══════════════════════════════════════════════════ -->
  <div id="loading-screen">
    <div class="loading-logo">🎮</div>
    <div class="loading-title">eMatch</div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- AUTH PAGE (login / register)                       -->
  <!-- ══════════════════════════════════════════════════ -->
  <div id="auth-page">

    <div id="offline-banner" class="offline-banner hidden" role="alert">
      📵 Internetka kuma xidna
    </div>

    <!-- Hero -->
    <div class="auth-hero">
      <div class="auth-logo">🎮</div>
      <h1>eMatch</h1>
      <p>Ciyaar · Tartam · Guuleeso</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login"    aria-selected="true">Gal</button>
      <button class="tab-btn"        data-tab="register" aria-selected="false">Diiwaan Geli</button>
    </div>

    <!-- LOGIN -->
    <div class="tab-content" data-tab="login">
      <form class="auth-form" id="login-form" novalidate>

        <div class="form-group">
          <label for="login_email">Email</label>
          <div class="input-wrap">
            <input type="email" id="login_email"
              placeholder="email@example.com"
              autocomplete="email" inputmode="email">
          </div>
          <span class="error-msg" id="login_email_err"></span>
        </div>

        <div class="form-group">
          <label for="login_password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login_password"
              placeholder="••••••••"
              autocomplete="current-password">
            <button type="button" class="pw-toggle" aria-label="Password muuji/qari">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="login_password_err"></span>
          <button type="button" class="forgot-link" id="btn_forgot_pw">
            Password-ka ilowday?
          </button>
        </div>

        <button type="submit" class="btn btn-primary btn-auth" id="btn_login">
          <span class="btn-text">🔑 Gal</span>
          <div class="btn-spinner"></div>
        </button>

        <div class="auth-divider">ama</div>

        <button type="button" class="btn-google" id="btn_google">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google ku gal
        </button>

      </form>
    </div>

    <!-- REGISTER -->
    <div class="tab-content hidden" data-tab="register">
      <form class="auth-form" id="register-form" novalidate>

        <div class="form-group">
          <label for="reg_fullName">Magaca Buuxa</label>
          <div class="input-wrap">
            <input type="text" id="reg_fullName"
              placeholder="Magacaaga oo buuxa"
              autocomplete="name">
          </div>
          <span class="error-msg" id="reg_fullName_err"></span>
        </div>

        <div class="form-group">
          <label for="reg_email">Email</label>
          <div class="input-wrap">
            <input type="email" id="reg_email"
              placeholder="email@example.com"
              autocomplete="email" inputmode="email">
          </div>
          <span class="error-msg" id="reg_email_err"></span>
        </div>

        <div class="form-group">
          <label for="reg_phone">Lambarka Telefoonka</label>
          <div class="input-wrap">
            <input type="tel" id="reg_phone"
              placeholder="+252xxxxxxxxx"
              autocomplete="tel" inputmode="tel">
          </div>
          <span class="error-msg" id="reg_phone_err"></span>
        </div>

        <div class="form-group">
          <label for="reg_password">Password</label>
          <div class="input-wrap">
            <input type="password" id="reg_password"
              placeholder="Ugu yaraan 8 xaraf"
              autocomplete="new-password">
            <button type="button" class="pw-toggle" aria-label="Password muuji/qari">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="reg_password_err"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-auth" id="btn_register">
          <span class="btn-text">✅ Xisaab Fur</span>
          <div class="btn-spinner"></div>
        </button>

        <p class="auth-terms">
          Xisaab furista waxaad ogolaanaysaa xeerarka iyo shuruucda eMatch
        </p>

      </form>
    </div>

  </div><!-- /#auth-page -->

</div><!-- /#app -->

<!-- ══════════════════════════════════════════════════════ -->
<!-- AUTH CHECK — inline, runs before app.js               -->
<!-- ══════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAW921oL1KTEk5n75xWvfGWM4Ab1SKnpbg",
    authDomain:        "ematch-bb818.firebaseapp.com",
    databaseURL:       "https://ematch-bb818-default-rtdb.firebaseio.com",
    projectId:         "ematch-bb818",
    storageBucket:     "ematch-bb818.firebasestorage.app",
    messagingSenderId: "955647946180",
    appId:             "1:955647946180:web:c66947044f0dd6f633c891"
  };

  const fireApp  = initializeApp(firebaseConfig, 'auth-check');
  const fireAuth = getAuth(fireApp);

  const loadingEl = document.getElementById('loading-screen');
  const authEl    = document.getElementById('auth-page');

  function hideLoading() {
    loadingEl.classList.add('fade-out');
    setTimeout(() => loadingEl.style.display = 'none', 300);
  }

  // onAuthStateChanged — called once on page load
  const unsub = onAuthStateChanged(fireAuth, user => {
    unsub(); // unsubscribe immediately — one-time check
    if (user) {
      // User horay u login sameeyay — toos u dir dashboard
      window.location.replace('dashboard.html');
    } else {
      // User ma jiro — login page muuji
      hideLoading();
      authEl.classList.add('visible');
    }
  });
</script>

<script src="js/sos-rate.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
