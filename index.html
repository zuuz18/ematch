<!DOCTYPE html>
<html lang="so" dir="ltr">
<head>
  <link rel="icon" href="img/ematch-logo.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="eMatch — Ciyaar, Tartam, Guuleeso">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>eMatch — Gal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <script>
(function(){
  document.documentElement.style.visibility = 'hidden';

  var st = document.createElement('style');
  st.textContent = `
    #ematch-loader {
      position:fixed;inset:0;z-index:99999;
      background:#0d1117;
      display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
      transition:opacity 400ms ease;
    }
    #ematch-loader::before {
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%,rgba(0,230,118,.10) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 60%,rgba(59,130,246,.08) 0%,transparent 70%);
      pointer-events:none;
    }
    @keyframes emSpin  { to { transform:rotate(360deg); } }
    @keyframes emPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(.9);opacity:.7;} }
    @keyframes emDot   { 0%,80%,100%{transform:scale(1);opacity:.15;} 40%{transform:scale(1.5);opacity:.7;} }
    .em-ring      { position:relative;width:88px;height:88px; }
    .em-ring svg  { position:absolute;inset:0;animation:emSpin 1.4s linear infinite; }
    .em-ring-icon { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;animation:emPulse 2s ease-in-out infinite; }
    .em-brand     { font-size:28px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#00e676,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .em-tag       { font-size:11px;font-weight:500;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase; }
    .em-prog-wrap { width:160px;height:2px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-top:12px; }
    .em-prog-bar  { height:100%;width:0%;background:linear-gradient(90deg,#00e676,#3b82f6);border-radius:99px;transition:width 220ms linear;box-shadow:0 0 8px rgba(0,230,118,.5); }
    .em-status    { font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.5px;margin-top:10px;min-height:16px; }
    .em-dots      { position:absolute;bottom:44px;left:50%;transform:translateX(-50%);display:flex;gap:6px; }
    .em-dot       { width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.15);animation:emDot 1.4s ease-in-out infinite; }
    .em-dot:nth-child(2){animation-delay:.18s;}
    .em-dot:nth-child(3){animation-delay:.36s;}
  `;
  document.head.appendChild(st);

  var el = document.createElement('div');
  el.id = 'ematch-loader';
  el.innerHTML = `
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0">
      <div class="em-ring" style="margin-bottom:24px">
        <svg viewBox="0 0 88 88">
          <defs>
            <linearGradient id="emGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#00e676"/>
              <stop offset="100%" stop-color="#3b82f6"/>
            </linearGradient>
          </defs>
          <circle cx="44" cy="44" r="40" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="2.5"/>
          <circle cx="44" cy="44" r="40" fill="none" stroke="url(#emGrad)"
            stroke-width="2.5" stroke-linecap="round" stroke-dasharray="60 220"/>
        </svg>
        <div class="em-ring-icon">🎮</div>
      </div>
      <div class="em-brand">eMatch</div>
      <div class="em-tag">Gaming Arena</div>
      <div class="em-prog-wrap"><div class="em-prog-bar" id="em-bar"></div></div>
      <div class="em-status" id="em-txt">Xogta la soo qaadayaa...</div>
    </div>
    <div class="em-dots">
      <div class="em-dot"></div>
      <div class="em-dot"></div>
      <div class="em-dot"></div>
    </div>`;

  document.addEventListener('DOMContentLoaded', function(){
    document.documentElement.style.visibility = 'visible';
    document.body.insertBefore(el, document.body.firstChild);
    var bar = document.getElementById('em-bar');
    var txt = document.getElementById('em-txt');
    var steps = [
      {p:20, t:'Xogta la soo qaadayaa...',  d:0   },
      {p:45, t:'Firebase la xiriiraya...',   d:300 },
      {p:70, t:'Xisaabta la hubinayaa...',  d:700 },
      {p:88, t:'Diyaargarowga...',           d:1100},
      {p:100,t:'Ku soo dhawow! ✅',          d:1400}
    ];
    steps.forEach(function(s){
      setTimeout(function(){
        if(bar) bar.style.width = s.p+'%';
        if(txt) txt.textContent = s.t;
      }, s.d);
    });
  });

  window._hideLoader = function(){
    var el = document.getElementById('ematch-loader');
    if(!el) return;
    el.style.opacity = '0';
    setTimeout(function(){ if(el.parentNode) el.remove(); }, 420);
  };

  window.addEventListener('load', function(){
    setTimeout(function(){
      if(document.getElementById('ematch-loader')) window._hideLoader();
    }, 5000);
  });

})();
</script>
</head>
<body>
<div id="app">

  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner hidden" role="alert" aria-live="assertive">
    📵 Internetka kuma xidna — gal ka dib markii xiriirku soo laabto
  </div>

  <div class="auth-page">

    <!-- ── Hero ──────────────────────────────────────────── -->
    <div class="auth-hero">
      <span class="auth-logo">eMatch</span>
      <p class="auth-tagline">Ciyaar · Tartam · Guuleeso 🏆</p>
    </div>

    <!-- ── Auth Card ─────────────────────────────────────── -->
    <div class="auth-card">

      <!-- Tab Bar -->
      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="login"
          role="tab" aria-selected="true" aria-controls="tab-login">
          Gal
        </button>
        <button class="tab-btn" data-tab="register"
          role="tab" aria-selected="false" aria-controls="tab-register">
          Qorso
        </button>
      </div>

      <!-- ════ LOGIN TAB ════════════════════════════════════ -->
      <div id="tab-login" class="tab-content" data-tab="login" role="tabpanel">
        <form id="login-form" novalidate autocomplete="on">

          <!-- Email -->
          <div class="form-group">
            <label for="login_email">Email</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input
                type="email"
                id="login_email"
                name="email"
                placeholder="magac@email.com"
                autocomplete="email"
                inputmode="email"
                aria-label="Email-kaaga"
                aria-describedby="login_email_err"
                required>
            </div>
            <div class="error-msg" id="login_email_err" role="alert" aria-live="polite"></div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="login_password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="login_password"
                name="password"
                placeholder="Password-kaaga"
                autocomplete="current-password"
                aria-label="Password"
                aria-describedby="login_password_err"
                required>
              <button type="button" class="pw-toggle" aria-label="Password muuji ama qari">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="error-msg" id="login_password_err" role="alert" aria-live="polite"></div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-primary" id="btn_login">
            <span class="btn-text">Gal →</span>
            <div class="btn-spinner"></div>
          </button>

          <!-- Forgot Password -->
          <button type="button" class="btn btn-ghost mt-sm" id="btn_forgot_pw">
            🔑 Password-ka waan illoobay
          </button>

        </form>

        <!-- Divider -->
        <div class="social-divider">ama</div>

        <!-- Google Sign In -->
        <button class="btn btn-secondary" id="btn_google" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google-ka ku Gal
        </button>
      </div>

      <!-- ════ REGISTER TAB ══════════════════════════════════ -->
      <div id="tab-register" class="tab-content hidden" data-tab="register" role="tabpanel">
        <form id="register-form" novalidate autocomplete="on">

          <!-- Full Name -->
          <div class="form-group">
            <label for="reg_fullName">Magaca Buuxa</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input
                type="text"
                id="reg_fullName"
                name="fullName"
                placeholder="Magacaaga oo dhan"
                autocomplete="name"
                aria-label="Magacaaga buuxa"
                aria-describedby="reg_fullName_err"
                required>
            </div>
            <div class="error-msg" id="reg_fullName_err" role="alert" aria-live="polite"></div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="reg_email">Email</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input
                type="email"
                id="reg_email"
                name="email"
                placeholder="magac@email.com"
                autocomplete="email"
                inputmode="email"
                aria-label="Email-kaaga"
                aria-describedby="reg_email_err"
                required>
            </div>
            <div class="error-msg" id="reg_email_err" role="alert" aria-live="polite"></div>
          </div>

          <!-- Phone -->
          <div class="form-group">
            <label for="reg_phone">Telefon</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.61 4.35 2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.08 6.08l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <input
                type="tel"
                id="reg_phone"
                name="phone"
                placeholder="+252 61 234 5678"
                autocomplete="tel"
                inputmode="tel"
                aria-label="Lambarka telefonka"
                aria-describedby="reg_phone_err"
                required>
            </div>
            <div class="error-msg" id="reg_phone_err" role="alert" aria-live="polite"></div>
            <div class="field-hint">Tusaale: +252 61 234 5678</div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="reg_password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="reg_password"
                name="new-password"
                placeholder="Ugu yaraan 8 xaraf"
                autocomplete="new-password"
                aria-label="Password cusub"
                aria-describedby="reg_password_err"
                required>
              <button type="button" class="pw-toggle" aria-label="Password muuji ama qari">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="error-msg" id="reg_password_err" role="alert" aria-live="polite"></div>
            <div class="field-hint">Ugu yaraan 8 xaraf — awood leh isticmaal</div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-primary" id="btn_register">
            <span class="btn-text">✦ Xisaab Abuur</span>
            <div class="btn-spinner"></div>
          </button>

        </form>

        <!-- Divider -->
        <div class="social-divider">ama</div>

        <!-- Google Register -->
        <button class="btn btn-secondary" type="button"
          onclick="document.getElementById('btn_google').click()">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google-ka ku Qorso
        </button>
      </div>

    </div>
    <!-- /auth-card -->

    <p class="text-center text-muted mt-md" style="font-size:12px;padding-bottom:32px">
      📱 eMatch v1.0 &nbsp;·&nbsp; Shuruucda oo dhami waxay daboolaan privacy-gaaga
    </p>

  </div>
  <!-- /auth-page -->

</div>
<!-- /app -->

<!-- Firebase SDK (ES Modules) -->
<script type="module" src="js/app.js"></script>
</body>
</html>
