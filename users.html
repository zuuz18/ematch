<!DOCTYPE html>
<html lang="so" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>eMatch — User Management</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">

  <style>
    :root {
      --purple: #a855f7;
      --purple-dim: rgba(168,85,247,.15);
      --purple-border: rgba(168,85,247,.3);
    }

    /* ── Header ─────────────────────────────────────────── */
    .page-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 var(--sp-md);
      height: 56px;
      display: flex; align-items: center; gap: var(--sp-sm);
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-card2); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background var(--dur-fast);
      color: var(--text-secondary);
    }
    .back-btn:active { background: var(--border); }
    .header-title { flex: 1; font-size: 16px; font-weight: 800; }
    .header-action-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-card2); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background var(--dur-fast);
      color: var(--text-secondary);
    }
    .header-action-btn:active { background: var(--border); }

    /* ── Search bar ─────────────────────────────────────── */
    .search-bar {
      position: sticky; top: 56px; z-index: 90;
      background: rgba(13,17,23,.95);
      backdrop-filter: blur(16px);
      padding: var(--sp-sm) var(--sp-md);
      border-bottom: 1px solid var(--glass-border);
    }
    .search-inner {
      position: relative; display: flex; align-items: center;
    }
    .search-inner svg {
      position: absolute; left: 14px;
      color: var(--text-muted); pointer-events: none;
    }
    .search-inner input {
      width: 100%; padding: 10px 42px;
      background: var(--bg-card2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-full);
      color: var(--text-primary); font-size: 14px;
      transition: border-color var(--dur-fast);
    }
    .search-inner input:focus {
      outline: none; border-color: var(--accent-green);
    }
    .search-clear {
      position: absolute; right: 14px;
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      display: none; padding: 2px;
    }
    .search-inner input:not(:placeholder-shown) ~ .search-clear { display: block; }

    /* ── Filter tabs ────────────────────────────────────── */
    .filter-tabs {
      display: flex; overflow-x: auto; scrollbar-width: none;
      gap: var(--sp-sm); padding: var(--sp-sm) var(--sp-md);
      border-bottom: 1px solid var(--glass-border);
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .ftab {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px;
      border-radius: var(--r-full);
      background: var(--bg-card2);
      border: 1.5px solid var(--border);
      color: var(--text-muted); font-size: 12px; font-weight: 700;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
      white-space: nowrap;
    }
    .ftab.active {
      background: var(--purple-dim);
      border-color: var(--purple-border);
      color: var(--purple);
    }
    .ftab-count {
      background: rgba(255,255,255,.1);
      border-radius: var(--r-full);
      padding: 1px 6px; font-size: 10px; font-weight: 800;
    }
    .ftab.active .ftab-count {
      background: var(--purple-border);
      color: var(--purple);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 0 0 rgba(0,230,118,.4);
      animation: livePulse 1.4s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,230,118,.4); }
      50%      { box-shadow: 0 0 0 5px rgba(0,230,118,0); }
    }

    /* ── Stats banner ───────────────────────────────────── */
    .stats-banner {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
    }
    .stat-b {
      background: var(--bg-card);
      padding: 10px 8px; text-align: center;
    }
    .stat-b-val { font-size: 17px; font-weight: 900; line-height: 1; }
    .stat-b-lbl { font-size: 9px; color: var(--text-muted); font-weight: 600;
                  text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }

    /* ── User cards ─────────────────────────────────────── */
    .user-list { padding: var(--sp-sm) var(--sp-md); }

    .user-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 12px var(--sp-md);
      margin-bottom: var(--sp-sm);
      cursor: pointer;
      transition: border-color var(--dur-fast), background var(--dur-fast);
      animation: cardIn .25s var(--ease) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(6px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .user-card:active { background: var(--bg-card2); border-color: var(--purple-border); }
    .u-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--accent-blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: #fff;
      flex-shrink: 0; position: relative;
    }
    .u-online-dot {
      position: absolute; bottom: 0; right: 0;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent-green);
      border: 2px solid var(--bg-card);
      box-shadow: 0 0 6px rgba(0,230,118,.5);
    }
    .u-info { flex: 1; min-width: 0; }
    .u-name {
      font-size: 14px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .u-email {
      font-size: 11px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .u-tags { display: flex; gap: 5px; margin-top: 4px; align-items: center; }
    .u-tag {
      font-size: 9px; font-weight: 700; padding: 2px 7px;
      border-radius: var(--r-full); text-transform: uppercase; letter-spacing: .3px;
    }
    .tag-sos     { background: rgba(255,215,0,.1);   color: var(--accent-gold);  border: 1px solid rgba(255,215,0,.2); }
    .tag-owner   { background: rgba(168,85,247,.12); color: var(--purple);       border: 1px solid var(--purple-border); }
    .tag-admin   { background: rgba(239,68,68,.1);   color: var(--accent-red);   border: 1px solid rgba(239,68,68,.2); }
    .tag-support { background: rgba(0,230,118,.08);  color: var(--accent-green); border: 1px solid rgba(0,230,118,.2); }
    .tag-user    { background: rgba(59,130,246,.08); color: var(--accent-blue);  border: 1px solid rgba(59,130,246,.2); }
    .tag-suspended { background: rgba(239,68,68,.12); color: var(--accent-red);  border: 1px solid rgba(239,68,68,.3); }
    .tag-online  { font-size: 9px; color: var(--accent-green); font-weight: 700; }
    .u-chevron   { color: var(--text-muted); flex-shrink: 0; }

    /* ── Skeleton ───────────────────────────────────────── */
    .sk-card {
      height: 70px; border-radius: var(--r-md);
      background: linear-gradient(90deg, var(--bg-card2) 25%, var(--border) 50%, var(--bg-card2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: var(--sp-sm);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Empty state ────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 48px var(--sp-md);
      color: var(--text-muted);
    }
    .empty-icon { font-size: 44px; margin-bottom: 12px; display: block; }
    .empty-label { font-size: 14px; }

    /* ═══════════════════════════════════════════════════
       USER DETAIL MODAL
    ═══════════════════════════════════════════════════ */
    .ud-modal-sheet {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity var(--dur-med) var(--ease);
    }
    .ud-modal-sheet.open {
      opacity: 1; pointer-events: auto;
    }
    .ud-sheet {
      width: 100%; max-width: 430px;
      background: var(--bg-card);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      border: 1px solid var(--glass-border);
      border-bottom: none;
      max-height: 92dvh;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,1.2,.72,1);
    }
    .ud-modal-sheet.open .ud-sheet {
      transform: translateY(0);
    }
    .ud-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 12px auto 0;
      flex-shrink: 0;
    }
    .ud-scroll { overflow-y: auto; flex: 1; padding-bottom: env(safe-area-inset-bottom, 16px); }

    /* Profile banner inside detail */
    .ud-banner {
      height: 80px;
      background: linear-gradient(135deg, #0d1a2e, #1a0a2e);
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .ud-banner::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 60%, rgba(168,85,247,.15), transparent 60%),
                  radial-gradient(circle at 80% 30%, rgba(59,130,246,.12), transparent 60%);
    }
    .ud-avatar-zone {
      display: flex; align-items: flex-end; gap: var(--sp-md);
      padding: 0 var(--sp-md);
      margin-top: -28px; position: relative; z-index: 2;
    }
    .ud-avatar-lg {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--accent-blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      border: 3px solid var(--bg-card); flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(0,0,0,.5);
    }
    .ud-identity { padding-bottom: 4px; }
    .ud-name-lg { font-size: 17px; font-weight: 800; line-height: 1.1; }
    .ud-email-sm { font-size: 11px; color: var(--text-muted); }

    /* Stat row inside detail */
    .ud-stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: var(--sp-sm); padding: var(--sp-md);
    }
    .ud-stat-box {
      background: var(--bg-card2); border-radius: var(--r-sm);
      padding: 10px 8px; text-align: center;
      border: 1px solid var(--glass-border);
    }
    .ud-stat-val { font-size: 17px; font-weight: 900; line-height: 1; }
    .ud-stat-lbl { font-size: 9px; color: var(--text-muted); font-weight: 600;
                   text-transform: uppercase; letter-spacing: .3px; margin-top: 3px; }

    /* Info rows */
    .info-section {
      margin: 0 var(--sp-md) var(--sp-md);
      background: var(--bg-card2);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px var(--sp-md);
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-lbl { color: var(--text-muted); font-size: 11px; font-weight: 600; }
    .info-val { font-weight: 600; max-width: 56%; text-align: right; word-break: break-all; }

    /* Action section */
    .action-section {
      margin: 0 var(--sp-md) var(--sp-md);
    }
    .action-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted);
      margin-bottom: var(--sp-sm);
    }

    /* Role grid */
    .role-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: var(--sp-sm);
    }
    .role-pill {
      padding: 9px; border-radius: var(--r-md); text-align: center;
      font-size: 12px; font-weight: 700;
      background: var(--bg-card2); border: 1.5px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
    }
    .role-pill:active { transform: scale(.97); }
    .role-pill.active {
      background: var(--purple-dim); border-color: var(--purple-border); color: var(--purple);
    }
    .role-pill.owner-pill.active {
      background: rgba(255,215,0,.1); border-color: rgba(255,215,0,.35); color: var(--accent-gold);
    }
    .role-pill.danger-pill.active {
      background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: var(--accent-red);
    }

    /* Balance adjust */
    .balance-row {
      display: flex; gap: var(--sp-sm); align-items: stretch;
    }
    .balance-input {
      flex: 1;
      background: var(--bg-card2); border: 1.5px solid var(--border);
      border-radius: var(--r-md); color: var(--text-primary);
      font-size: 15px; font-weight: 700; padding: 0 var(--sp-md);
      height: 44px;
    }
    .balance-input:focus { outline: none; border-color: var(--accent-green); }
    .balance-add { background: rgba(0,230,118,.1); border: 1.5px solid rgba(0,230,118,.25); color: var(--accent-green); border-radius: var(--r-md); padding: 0 16px; height: 44px; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: background var(--dur-fast); }
    .balance-sub { background: rgba(239,68,68,.08); border: 1.5px solid rgba(239,68,68,.22); color: var(--accent-red);   border-radius: var(--r-md); padding: 0 16px; height: 44px; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: background var(--dur-fast); }
    .balance-add:active { background: rgba(0,230,118,.2); }
    .balance-sub:active { background: rgba(239,68,68,.18); }
    .balance-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    /* Quick action buttons */
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-sm); }
    .qa-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px; border-radius: var(--r-md); font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1.5px solid var(--glass-border);
      background: var(--bg-card2); color: var(--text-secondary);
      transition: all var(--dur-fast) var(--ease);
    }
    .qa-btn:active { transform: scale(.97); }
    .qa-btn.danger { background: rgba(239,68,68,.06); border-color: rgba(239,68,68,.2); color: var(--accent-red); }

    /* Transaction history inside detail */
    .tx-mini {
      display: flex; align-items: center; gap: 10px;
      padding: 9px var(--sp-md);
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 12px;
    }
    .tx-mini:last-child { border-bottom: none; }
    .tx-mini-icon {
      width: 30px; height: 30px; border-radius: var(--r-sm);
      background: var(--bg-card2); display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .tx-mini-info { flex: 1; min-width: 0; }
    .tx-mini-label { font-weight: 600; color: var(--text-primary); }
    .tx-mini-date  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .tx-mini-amt   { font-weight: 800; flex-shrink: 0; }
    .tx-mini-amt.cr { color: var(--accent-green); }
    .tx-mini-amt.dr { color: var(--accent-red); }

    /* Detail close btn */
    .ud-close {
      position: absolute; top: var(--sp-sm); right: var(--sp-md);
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,.4); border: none;
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 5;
    }

    /* Sort indicator */
    .sort-btn {
      display: flex; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11px; font-weight: 700;
      padding: 4px 8px; border-radius: var(--r-sm);
      transition: color var(--dur-fast);
    }
    .sort-btn.active { color: var(--purple); }
  </style>
</head>
<body>
<div id="app">

  <div id="offline-banner" class="offline-banner hidden" role="alert">
    📵 Internetka kuma xidna
  </div>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="page-header">
    <button class="back-btn" onclick="history.back()" aria-label="Dib">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="header-title">👥 User Management</span>
    <button class="header-action-btn" onclick="refreshUsers()" id="refresh-btn" aria-label="Dib u cusboonaysii">
      <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <button class="header-action-btn" onclick="toggleSort()" id="sort-btn-hdr"
      title="Tartib bedel" aria-label="Tartib bedel"
      style="font-size:11px;font-weight:800;color:var(--text-muted)">
      ⇅
    </button>
  </header>

  <!-- ── Search ──────────────────────────────────────────── -->
  <div class="search-bar">
    <div class="search-inner">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input"
        placeholder="Magac, email ama UID raadi..."
        autocomplete="off" autocorrect="off"
        oninput="onSearch(this.value)">
      <button class="search-clear" onclick="clearSearch()" aria-label="Nadiifi">✕</button>
    </div>
  </div>

  <!-- ── Stats banner ────────────────────────────────────── -->
  <div class="stats-banner">
    <div class="stat-b">
      <div class="stat-b-val" id="sb-total" style="color:var(--accent-blue)">—</div>
      <div class="stat-b-lbl">Dhammaan</div>
    </div>
    <div class="stat-b">
      <div class="stat-b-val" id="sb-online" style="color:var(--accent-green)">—</div>
      <div class="stat-b-lbl">Online</div>
    </div>
    <div class="stat-b">
      <div class="stat-b-val" id="sb-sos" style="color:var(--accent-gold)">—</div>
      <div class="stat-b-lbl">Total SOS</div>
    </div>
    <div class="stat-b">
      <div class="stat-b-val" id="sb-admins" style="color:var(--purple)">—</div>
      <div class="stat-b-lbl">Admins</div>
    </div>
  </div>

  <!-- ── Filter tabs ──────────────────────────────────────── -->
  <div class="filter-tabs">
    <button class="ftab active" data-f="all"       onclick="setFilter('all',this)">
      👥 Dhammaan <span class="ftab-count" id="fc-all">0</span>
    </button>
    <button class="ftab" data-f="online"   onclick="setFilter('online',this)">
      <span class="live-dot"></span> Online <span class="ftab-count" id="fc-online">0</span>
    </button>
    <button class="ftab" data-f="admins"   onclick="setFilter('admins',this)">
      🛡️ Admins <span class="ftab-count" id="fc-admins">0</span>
    </button>
    <button class="ftab" data-f="highbal"  onclick="setFilter('highbal',this)">
      💰 Top SOS
    </button>
    <button class="ftab" data-f="new"      onclick="setFilter('new',this)">
      🆕 Cusub
    </button>
    <button class="ftab" data-f="suspended" onclick="setFilter('suspended',this)">
      🚫 Suspended
    </button>
  </div>

  <!-- ── Main List ────────────────────────────────────────── -->
  <main class="page-content">
    <div class="user-list" id="user-list">
      <div class="sk-card"></div>
      <div class="sk-card"></div>
      <div class="sk-card"></div>
      <div class="sk-card" style="height:55px"></div>
    </div>
    <div style="height:32px"></div>
  </main>

</div><!-- #app -->

<!-- ══════════════════════════════════════════════════════
     USER DETAIL MODAL
══════════════════════════════════════════════════════ -->
<div class="ud-modal-sheet" id="ud-modal" onclick="handleUdOverlayClick(event)">
  <div class="ud-sheet" id="ud-sheet">
    <div class="ud-handle"></div>
    <div class="ud-scroll" id="ud-scroll">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/sos-rate.js"></script>
<script type="module">
import { initializeApp, getApps }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, sendPasswordResetEmail }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc, getDoc, updateDoc, onSnapshot,
  collection, query, where, orderBy, limit,

function toast(msg, type = 'info') {
  if (window.showToast) { window.showToast(msg, type); return; }
  const old = $('_toast'); if (old) old.remove();
  const t = document.createElement('div');
  t.id = '_toast';
  Object.assign(t.style, {
    position:'fixed', bottom:'24px', left:'50%',
    transform:'translateX(-50%) translateY(20px)',
    background: type==='success'?'var(--accent-green)':type==='error'?'var(--accent-red)':'var(--bg-card2)',
    color: type==='success'?'#000':'#fff',
    padding:'10px 20px', borderRadius:'9999px',
    fontSize:'14px', fontWeight:'600', zIndex:'9999',
    maxWidth:'360px', textAlign:'center',
    transition:'all 220ms', border:'1px solid rgba(255,255,255,.1)',
    opacity:'0'
  });
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>{ t.style.transform='translateX(-50%) translateY(0)'; t.style.opacity='1'; });
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}

function isOnline(u) {
  const ms = u.lastSeen?.toMillis?.() || ((u.lastSeen?.seconds||0)*1000);
  return ms && (Date.now()-ms) < 3*60*1000;
}

// ── State ───────────────────────────────────────────────

let filter     = 'all';
let searchTerm = '';
let sortMode   = 'online'; // 'online' | 'sos' | 'newest' | 'oldest'
let myUid      = null;
let myRole     = 'user';
let unsub      = null;

const ADMIN_ROLES = ['owner','administrator','partner_manager','support','agent'];

// ── Auth gate ───────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.replace('index.html'); return; }
  myUid = user.uid;

  // Load my role
  try {
    const snap = await getDoc(doc(db,'users',myUid));
    if (snap.exists()) myRole = snap.data().role || 'user';
  } catch(_){}

  if (!ADMIN_ROLES.includes(myRole)) {
    toast('Admin access ma lihid','error');
    setTimeout(()=>window.location.replace('dashboard.html'),1500);
    return;
  }

  startListen();
});

// ── Real-time listener ──────────────────────────────────
async function startListen() {
  if (unsub) { unsub(); unsub = null; }
  const listEl = $('user-list');

  // Show skeleton while loading
  listEl.innerHTML = `
    <div class="sk-card"></div>
    <div class="sk-card"></div>
    <div class="sk-card"></div>
    <div class="sk-card" style="height:55px"></div>`;

  try {
    // Force fetch from server (bypass local cache)
    const snap = await getDocsFromServer(query(collection(db,'users'), limit(500)));
    allUsers = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    updateStatsBanner();
    renderList();

    // After first server fetch, subscribe to live updates
    const q = query(collection(db,'users'), limit(500));
    unsub = onSnapshot(q, s => {
      allUsers = s.docs.map(d => ({ _id: d.id, ...d.data() }));
      updateStatsBanner();
      renderList();
    }, err => {
      listEl.innerHTML = `<div class="empty-state"><span class="empty-icon">❌</span><span class="empty-label">${err.message}</span></div>`;
    });
  } catch(err) {
    listEl.innerHTML = `<div class="empty-state"><span class="empty-icon">❌</span><span class="empty-label">${err.message}</span></div>`;
  }
}

// ── Stats banner ────────────────────────────────────────
function updateStatsBanner() {
  const online  = allUsers.filter(isOnline).length;
  const totalSOS= allUsers.reduce((s,u)=>s+(u.sosBalance||0),0);
  const admins  = allUsers.filter(u=>ADMIN_ROLES.includes(u.role)).length;

  $('sb-total').textContent  = allUsers.length;
  $('sb-online').textContent = online;
  $('sb-sos').textContent    = totalSOS>999999 ? (totalSOS/1000000).toFixed(1)+'M' : totalSOS>999 ? Math.round(totalSOS/1000)+'K' : totalSOS;
  $('sb-admins').textContent = admins;

  // Tab counts
  $('fc-all').textContent    = allUsers.length;
  $('fc-online').textContent = online;
  $('fc-admins').textContent = admins;
}

// ── Filter + search + sort ──────────────────────────────
function getFiltered() {
  let list = [...allUsers];

  if (filter === 'online')    list = list.filter(isOnline);
  if (filter === 'admins')    list = list.filter(u => ADMIN_ROLES.includes(u.role));
  if (filter === 'highbal')   list = list.sort((a,b)=>(b.sosBalance||0)-(a.sosBalance||0));
  if (filter === 'new')       { const wk = Date.now()-7*24*3600*1000; list = list.filter(u=>(u.createdAt?.toMillis?.()|(u.createdAt?.seconds*1000)||0)>wk); }
  if (filter === 'suspended') list = list.filter(u=>u.role==='suspended');

  if (searchTerm) {
    const t = searchTerm;
    list = list.filter(u =>
      (u.fullName||'').toLowerCase().includes(t) ||
      (u.email||'').toLowerCase().includes(t)    ||
      (u._id||'').toLowerCase().includes(t)      ||
      (u.phone||'').includes(t)
    );
  }

  // Sort (unless filter already handles sort)
  if (filter !== 'highbal') {
    if (sortMode === 'online') {
      list.sort((a,b) => {
        const ao=isOnline(a)?1:0, bo=isOnline(b)?1:0;
        if (ao!==bo) return bo-ao;
        const at=a.createdAt?.toMillis?.()|(a.createdAt?.seconds*1000)||0;
        const bt=b.createdAt?.toMillis?.()|(b.createdAt?.seconds*1000)||0;
        return bt-at;
      });
    } else if (sortMode === 'sos') {
      list.sort((a,b)=>(b.sosBalance||0)-(a.sosBalance||0));
    } else if (sortMode === 'newest') {
      list.sort((a,b)=>((b.createdAt?.toMillis?.()|(b.createdAt?.seconds*1000)||0))-((a.createdAt?.toMillis?.()|(a.createdAt?.seconds*1000)||0)));
    } else if (sortMode === 'oldest') {
      list.sort((a,b)=>((a.createdAt?.toMillis?.()|(a.createdAt?.seconds*1000)||0))-((b.createdAt?.toMillis?.()|(b.createdAt?.seconds*1000)||0)));
    }
  }

  return list;
}

// ── Render list ──────────────────────────────────────────
function renderList() {
  const listEl = $('user-list');
  const users  = getFiltered();

  if (!users.length) {
    listEl.innerHTML = `<div class="empty-state">
      <span class="empty-icon">${searchTerm ? '🔍' : '👤'}</span>
      <span class="empty-label">${searchTerm ? 'User la ma helin' : 'Isticmaale ma jiro'}</span>
    </div>`;
    return;
  }

  const roleTag = u => {
    if (u.role==='owner')           return `<span class="u-tag tag-owner">👑 Owner</span>`;
    if (u.role==='administrator')   return `<span class="u-tag tag-admin">🛡️ Admin</span>`;
    if (u.role==='partner_manager') return `<span class="u-tag tag-support">🤝 Partner</span>`;
    if (u.role==='support')         return `<span class="u-tag tag-support">🎧 Support</span>`;
    if (u.role==='agent')           return `<span class="u-tag tag-support">📋 Agent</span>`;
    if (u.role==='suspended')       return `<span class="u-tag tag-suspended">🚫 Suspended</span>`;
    return `<span class="u-tag tag-user">👤 User</span>`;
  };

  listEl.innerHTML = users.map((u, i) => {
    const ini    = (u.fullName||'U').split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const online = isOnline(u);
    const avatarBg = u.role==='owner' ? 'background:linear-gradient(135deg,#ffd700,#ff6b00)' :
                     ADMIN_ROLES.includes(u.role) ? 'background:linear-gradient(135deg,var(--purple),var(--accent-blue))' : '';
    return `
      <div class="user-card" style="animation-delay:${Math.min(i*.03,.5)}s"
           onclick="openDetail('${u._id}')">
        <div class="u-avatar" ${avatarBg ? `style="${avatarBg}"` : ''}>
          ${ini}
          ${online ? '<div class="u-online-dot"></div>' : ''}
        </div>
        <div class="u-info">
          <div class="u-name">${u.fullName || '—'}</div>
          <div class="u-email">${u.email || u.phone || (u._id||'').slice(0,20)+'...'}</div>
          <div class="u-tags">
            ${roleTag(u)}
            <span class="u-tag tag-sos">${fmt(u.sosBalance||0)} SOS</span>
            ${online ? '<span class="tag-online">● online</span>' : ''}
          </div>
        </div>
        <svg class="u-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>`;
  }).join('');
}

// ── Role change ──────────────────────────────────────────
window.setRole = async (uid, role, label) => {
  if (!confirm(`Role ku bedel:\n→ ${label}\nUser: ${uid.slice(0,16)}...`)) return;
  try {
    await updateDoc(doc(db,'users',uid), { role });
    await addDoc(collection(db,'adminLogs'), {
      action:'change_role', adminUid:myUid, targetUserId:uid,
      newRole:role, createdAt:serverTimestamp()
    });
    toast(`✅ Role: ${label}`,'success');
    // Update card in list + re-open detail
    const idx = allUsers.findIndex(u=>u._id===uid);
    if (idx>-1) allUsers[idx].role = role;
    renderList();
    await openDetail(uid);
  } catch(err) { toast('Khalad: '+err.message,'error'); }
};

// ── Balance adjust ───────────────────────────────────────
window.adjustBal = async (uid, isAdd) => {
  const amount = parseInt($('bal-input')?.value)||0;
  if (amount<1) { toast('Qadarka geli (1+)','error'); return; }
  const label = isAdd ? `+${fmt(amount)} SOS ku dar` : `-${fmt(amount)} SOS ka jar`;
  if (!confirm(`💰 ${label}\nUser: ${uid.slice(0,16)}...`)) return;
  try {
    await runTransaction(db, async tx => {
      const uRef = doc(db,'users',uid);
      const uSnap = await tx.get(uRef);
      if (!uSnap.exists()) throw new Error('User la ma helin');
      const cur    = uSnap.data().sosBalance||0;
      const newBal = isAdd ? cur+amount : Math.max(0,cur-amount);
      tx.update(uRef, { sosBalance: newBal });
      tx.set(doc(collection(db,'transactions')), {
        userId:uid, type: isAdd?'admin_credit':'admin_debit',
        sos: isAdd?+amount:-amount, relatedMatch:null,
        createdAt:serverTimestamp(),
        meta:{ adjustedBy:myUid, reason:'manual_admin' }
      });
      tx.set(doc(collection(db,'adminLogs')), {
        action: isAdd?'credit_balance':'debit_balance',
        adminUid:myUid, targetUserId:uid, amount,
        createdAt:serverTimestamp()
      });
    });
    toast(`✅ ${label}!`,'success');
    const idx = allUsers.findIndex(u=>u._id===uid);
    if (idx>-1) allUsers[idx].sosBalance = isAdd
      ? (allUsers[idx].sosBalance||0)+amount
      : Math.max(0,(allUsers[idx].sosBalance||0)-amount);
    renderList();
    await openDetail(uid);
  } catch(err) { toast('Khalad: '+err.message,'error'); }
};

  await setRole(uid,'suspended','🚫 Suspended');
};

// ── Offline banner ───────────────────────────────────────
window.addEventListener('online',  ()=>$('offline-banner')?.classList.add('hidden'));
window.addEventListener('offline', ()=>$('offline-banner')?.classList.remove('hidden'));
if (!navigator.onLine) $('offline-banner')?.classList.remove('hidden');

// ── Back button closes modal ─────────────────────────────
window.addEventListener('popstate', ()=>{
  if ($('ud-modal')?.classList.contains('open')) {
    closeDetail();
    history.pushState(null,'',window.location.href);
  }
});

// ── Spin CSS ─────────────────────────────────────────────
const style = document.createElement('style');
style.textContent = `@keyframes spin { to { transform:rotate(360deg); } }`;
document.head.appendChild(style);

</script>
</body>
</html>
